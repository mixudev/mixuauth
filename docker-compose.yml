version: '3.9'

# ============================================================
# Stack lengkap: Laravel + FastAPI + VitePress + MySQL + Redis
# Semua service dalam network internal yang terisolasi.
# ============================================================

services:

  # ------------------------------------------------------------
  # Aplikasi Laravel
  # ------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    restart: unless-stopped
    command: php-fpm
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./laravel-auth-ai/.env
    volumes:
      # - app_storage:/var/www/html/storage # Dihapus agar sinkron dengan host dan Nginx
      - ./laravel-auth-ai:/var/www/html
      - ./ai-security/.env:/var/www/ai-security/.env
      - vendor_data:/var/www/html/vendor
    networks:
      - internal
    ports:
      - "9000:9000"

  # ------------------------------------------------------------
  # Nginx sebagai reverse proxy untuk Laravel
  # ------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./laravel-auth-ai:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

  # ------------------------------------------------------------
  # Queue Worker untuk pengiriman OTP (email async)
  # ------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    restart: unless-stopped
    command: php artisan queue:work redis --queue=notifications-high,default --tries=3 --backoff=5 --sleep=3
    depends_on:
      - app
      - redis
    env_file:
      - ./laravel-auth-ai/.env
    volumes:
      - ./laravel-auth-ai:/var/www/html
      - vendor_data:/var/www/html/vendor
    networks:
      - internal

  # ------------------------------------------------------------
  # Scheduler Laravel (cleanup OTP, dll.)
  # ------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"
    depends_on:
      - app
      - db
    env_file:
      - ./laravel-auth-ai/.env
    volumes:
      - ./laravel-auth-ai:/var/www/html
      - vendor_data:/var/www/html/vendor
    networks:
      - internal

  # ------------------------------------------------------------
  # FastAPI Risk Assessment Service
  # ------------------------------------------------------------
  fastapi-risk:
    build:
      context: ./ai-security
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./ai-security/.env
    volumes:
      - ./ai-security/app/models:/app/app/models
      - ./ai-security/logs:/app/logs
      - ./ai-security:/app
    ports:
      - "8000:8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ------------------------------------------------------------
  # VitePress Documentation (Mode Live-Reload Development)
  # ------------------------------------------------------------
  docs:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./docs:/app
      - docs_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8090"
    ports:
      - "8090:8090"
    networks:
      - internal

  # ------------------------------------------------------------
  # phpMyAdmin (development only)
  # ------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8081:80"
    networks:
      - internal

  # ------------------------------------------------------------
  # MySQL Database
  # ------------------------------------------------------------
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - ./laravel-auth-ai/.env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "3307:3306"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------------------------------------------------
  # Redis (cache, session, queue)
  # ------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  db_data:
  redis_data:
  app_storage:
  vendor_data:
  docs_node_modules:

networks:
  internal:
    driver: bridge