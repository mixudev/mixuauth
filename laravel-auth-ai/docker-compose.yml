version: '3.9'

# ============================================================
# Stack deployment untuk Secure Auth + FastAPI Risk Service
# Semua service berjalan dalam network internal yang terisolasi.
# FastAPI tidak boleh dapat diakses dari luar (hanya dari Laravel).
# ============================================================

services:

  # -- Aplikasi Laravel
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
    env_file:
      - .env
    volumes:
      - .:/var/www/html:delegated
      # - app_storage:/var/www/html/storage # Named volume diganti ke bind mount agar sinkron dengan host
    networks:
      - internal
      - proxy
    # Tidak mengekspos port langsung — akses via reverse proxy (Nginx/Traefik)

  # -- Queue Worker untuk notifikasi OTP
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: php artisan queue:work redis --queue=notifications-high,default --tries=3 --backoff=5
    depends_on:
      - app
      - redis
    env_file:
      - .env
    volumes:
      - .:/var/www/html:delegated
    networks:
      - internal

  # -- Scheduler untuk pembersihan OTP
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"
    depends_on:
      - app
      - db
    env_file:
      - .env
    volumes:
      - .:/var/www/html:delegated
    networks:
      - internal

  # -- Database MySQL
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -- Redis untuk cache, session, dan queue
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # -- FastAPI Risk Assessment Service
  # Service ini HANYA dapat diakses dari service 'app' — tidak dari luar
  fastapi-risk:
    image: your-registry/fastapi-risk:latest  # Ganti dengan image FastAPI Anda
    restart: unless-stopped
    environment:
      API_KEY: ${AI_RISK_API_KEY}
    networks:
      - internal  # Hanya dalam network internal, tidak terekspos ke luar
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  db_data:
  redis_data:
  app_storage:

networks:
  internal:
    driver: bridge
    internal: true    # Network tertutup — tidak ada akses internet langsung
  proxy:
    external: true    # Network yang terhubung ke reverse proxy (Nginx/Traefik)
