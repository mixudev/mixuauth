; ============================================================
; Konfigurasi OPcache untuk production
; Meningkatkan performa dengan meng-cache bytecode PHP.
; ============================================================

opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 1         ; Jangan cek perubahan file di production
opcache.validate_timestamps = 1     ; Percaya cache sepenuhnya — restart PHP-FPM untuk update
opcache.save_comments = 1
opcache.fast_shutdown = 1
