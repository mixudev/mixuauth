server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Keamanan: sembunyikan versi nginx
    server_tokens off;

    # Handle all request to index.php (Laravel routing)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Manual alias untuk storage agar tidak tergantung pada symlink Host
    location /storage {
        alias /var/www/html/storage/app/public;
        access_log off;
        log_not_found off;
        expires max;
    }

    # Proses file PHP via PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        include fastcgi_params;

        # Timeout yang cukup untuk request API
        fastcgi_read_timeout 60;
    }

    # Blokir akses ke file tersembunyi (.env, .git, dll.)
    location ~ /\. {
        deny all;
    }

    # Log
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
